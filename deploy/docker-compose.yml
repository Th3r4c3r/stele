# Stele deployment. Shares the Hetzner host with the Odoo stack.
#
# Networking model:
#   - `stele` network: app <-> db, private.
#   - `odoo_internal` (external): allows the existing Odoo Caddy to reach stele-app
#     via DNS name `stele-app:8080`. The Stele DB never joins this network.

services:
  app:
    image: stele:${STELE_VERSION:-dev}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VERSION: ${STELE_VERSION:-dev}
    container_name: stele-app
    restart: unless-stopped
    # Run as the host's yan user (UID 1000) so bind-mounted volumes
    # (notably /data/documents) are writable without chown ceremony.
    # The distroless image is happy with any numeric UID; we override
    # the default 'nonroot' (65532) here.
    user: "1000:1000"
    environment:
      STELE_ADDR: ":8080"
      STELE_VERSION: ${STELE_VERSION:-dev}
      # Use the container_name (stele-db), not the service name (db). The app
      # container also joins odoo_internal where another container exposes
      # the alias `db` (the Odoo Postgres). Using `stele-db` avoids the
      # collision: the name is unique across the Docker daemon.
      STELE_DATABASE_URL: postgres://stele:${STELE_DB_PASSWORD}@stele-db:5432/stele?sslmode=disable
      # Auth (ADR-009). App refuses to start without a 32+ byte secret.
      STELE_SESSION_SECRET: ${STELE_SESSION_SECRET}
      STELE_BASE_URL: ${STELE_BASE_URL:-https://stele.178-105-44-164.nip.io}
      # Email (optional; LogSender fallback when STELE_SMTP_HOST empty).
      STELE_SMTP_HOST: ${STELE_SMTP_HOST:-}
      STELE_SMTP_PORT: ${STELE_SMTP_PORT:-587}
      STELE_SMTP_USER: ${STELE_SMTP_USER:-}
      STELE_SMTP_PASS: ${STELE_SMTP_PASS:-}
      STELE_SMTP_FROM: ${STELE_SMTP_FROM:-stele@stele.local}
      # Documents storage (ADR-010). The host bind-mount is below.
      STELE_DOCS_DIR: /data/documents
      STELE_DOCS_MAX_BYTES: ${STELE_DOCS_MAX_BYTES:-26214400}
      # newplat JWT for telemetry sync (ADR-014). Empty disables
      # /admin/telemetry endpoints; the rest of the app keeps working.
      STELE_NEWPLAT_TOKEN: ${STELE_NEWPLAT_TOKEN:-}
    volumes:
      - /home/yan/data/documents:/data/documents
    depends_on:
      db:
        condition: service_healthy
    networks:
      - stele
      - odoo_internal

  db:
    image: postgres:16-alpine
    container_name: stele-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stele
      POSTGRES_PASSWORD: ${STELE_DB_PASSWORD}
      POSTGRES_DB: stele
    volumes:
      - stele-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stele -d stele"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stele

volumes:
  stele-db-data:

networks:
  stele:
    name: stele
  odoo_internal:
    external: true
