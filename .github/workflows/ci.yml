name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: lint + test + build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stele
          POSTGRES_PASSWORD: stele
          POSTGRES_DB: stele_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stele -d stele_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      STELE_TEST_DATABASE_URL: postgres://stele:stele@localhost:5432/stele_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -o /tmp/stele ./cmd/stele

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: stele:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
